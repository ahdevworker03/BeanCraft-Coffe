<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bean & Craft Coffee | Login</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS Link -->
    <link rel="stylesheet" href="Styles/tokens.css" />
    <link rel="stylesheet" href="Styles/login.css" />
  </head>
  <body>
    <div class="login">
      <!-- Left side: Image -->
      <div class="login__image"></div>

      <!-- Right side: Form -->
      <div class="login__form-container">
        <div class="login__form-wrapper">
          <!-- Top Link -->
          <div class="login__signup-top">
            Don't have an account? <a href="#">Sign up</a>
          </div>

          <!-- Header -->
          <div class="login__header">
            <h1 class="login__title">Welcome back!</h1>
            <p class="login__subtitle">Enter your email and password</p>
          </div>

          <!-- Form -->
          <form action="#" method="post">
            <!-- Email Field -->
            <div class="login__input-group">
              <span class="login__input-icon">
                <svg viewBox="0 0 24 24">
                  <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                </svg>
              </span>
              <input
                type="email"
                name="email"
                class="login__input"
                placeholder="Email address"
              />
            </div>

            <!-- Password Field -->
            <div class="login__input-group">
              <span class="login__input-icon">
                <svg viewBox="0 0 24 24">
                  <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                </svg>
              </span>
              <input
                type="password"
                name="password"
                class="login__input"
                placeholder="Password"
              />
            </div>

            <!-- Options -->
            <div class="login__options">
              <label class="login__remember">
                <input type="checkbox" name="remember" />
                Remember me
              </label>
              <a href="#" class="login__forgot">Forgot Password?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" class="login__btn">Login</button>

            <!-- Divider -->
            <div class="login__divider">
              <span>or login with</span>
            </div>

            <!-- Social Buttons -->
            <div class="login__social">
              <button type="button" class="login__social-btn" aria-label="Login with Google">
                <svg viewBox="0 0 24 24">
                  <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                  <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                  <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                  <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                  <path d="M1 1h22v22H1z" fill="none"/>
                </svg>
              </button>
              <button type="button" class="login__social-btn" aria-label="Login with Facebook">
                <svg viewBox="0 0 24 24" fill="#1877F2">
                  <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854V15.468H7.078V12.073H10.125V9.476c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.395h-2.796v8.459C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
              </button>
            </div>

            <!-- Footer -->
            <div class="login__footer">
              No account? <a href="#">Create an account</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
